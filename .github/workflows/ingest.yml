name: ingest
on:
  schedule:
    # Starter FØR det tidligste vinduet; scriptet venter så til et tilfeldig
    # tidspunkt i hvert spills vindu (norsk tid, håndterer sommer/vintertid selv).
    # UTC-tider valgt for sommertid; om vinteren venter scriptet ~1 t ekstra (ufarlig).
    - cron: "50 17 * * 6"       # lørdag (Lotto + Joker)
    - cron: "50 18 * * 2,3,5"   # tirsdag/onsdag/fredag (Eurojackpot, Vikinglotto+Joker)
  workflow_dispatch:            # manuell kjøring = hent alle spill straks
jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r ingest/requirements.txt
      - run: cd ingest && python push_supabase_api.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
